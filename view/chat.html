<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            background: #ffbc41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chat-container {
            max-width: 650px;
            min-width: 550px;
            height: 70%;
            margin: auto;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(170, 170, 170, 0.3);
        }

        .chat-header {
            background: #00a130;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #e7efe2;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            position: relative;
            font-size: 14px;
        }

        .sent {
            background: #a7ffc1;
            margin-left: auto;
        }

        .received {
            background: #fff;
            margin-right: auto;
        }

        .timestamp {
            font-size: 10px;
            color: gray;
            text-align: right;
            margin-top: 5px;
        }

        .chat-footer {
            padding: 10px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-footer input {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            🌐 Chat Room
        </div>

        <!-- Messages -->
        <div class="chat-body" id="chatBody">

            <!-- <div class="message received">
                Hello 👋
                <div class="timestamp">10:00 AM</div>
            </div>

            <div class="message sent">
                Hi! How are you?
                <div class="timestamp">10:01 AM</div>
            </div> -->

        </div>

        <!-- Input -->
        <div class="chat-footer">
            <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        const socket = io("http://localhost:4000", {
            auth: {
                token: localStorage.getItem("token")
            }
        });
        const chatBody = document.getElementById("chatBody");

        socket.on("connect", () => {
            console.log("✅ Connected to server:", socket.id);
        });

        socket.on("chat-message", (data) => {

            appendMessage(data.message, data.userId);

        });

        socket.on("connect_error", (err) => {
            console.log("❌ Auth error:", err.message);
        });

        function sendMessage() {

            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (!text) return;

            const token = localStorage.getItem("token");
            const user = parseJwt(token);

            if (!user) {
                alert("Please login again");
                window.location.href = "/login.html";
                return;
            }

            // Send to server
            socket.emit("chat-message", {
                message: text,
            });

            input.value = "";

        }

        // Append message
        function appendMessage(text, senderId) {

            const currentUserId = parseJwt(localStorage.getItem("token"))?.id;

            const msg = document.createElement("div");
            msg.className = "message " + (senderId === currentUserId ? "sent" : "received");

            msg.innerHTML = `
                ${text}
                <div class="timestamp">${getTime()}</div>
            `;

            chatBody.appendChild(msg);
            chatBody.scrollTop = chatBody.scrollHeight;

        }

        // Time helper
        function getTime() {

            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        }

        // Safe JWT parser
        function parseJwt(token) {

            if (!token) return null;

            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch {
                return null;
            }

        }

        // Enter key support
        document.getElementById("messageInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

    </script>

</body>

</html>
