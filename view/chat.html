<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: #ffbc41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chat-container {
            width: 600px;
            height: 75%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.15);
        }

        .chat-header {
            background: #00a130;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #e7efe2;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        .sent {
            background: #a7ffc1;
            margin-left: auto;
        }

        .received {
            background: #fff;
            margin-right: auto;
        }

        .timestamp {
            font-size: 10px;
            color: gray;
            text-align: right;
            margin-top: 5px;
        }

        .chat-footer {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        .chat-footer input {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <!-- Join Chat -->
        <div class="p-2 border-bottom">
            <input type="text" id="emailInput" class="form-control mb-2" placeholder="Enter user email">
            <button class="btn btn-primary w-100" onclick="joinRoom()">Start Chat</button>
        </div>

        <!-- Header -->
        <div class="chat-header">
            💬 Personal Chat
        </div>

        <!-- Messages -->
        <div class="chat-body" id="chatBody"></div>

        <!-- Input -->
        <div class="chat-footer">
            <input type="file" id="fileInput" />
            <button onclick="sendMedia()">Send File</button>
            <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        const API_URL = "http://localhost:4000/api";

        const socket = io("http://localhost:4000", {
            auth: {
                token: localStorage.getItem("token")
            }
        });

        const chatBody = document.getElementById("chatBody");

        let currentRoom = null;
        let receiver = null;

        // ✅ Parse JWT
        function parseJwt(token) {
            if (!token) return null;
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch {
                return null;
            }
        }

        // ✅ Deterministic Room ID
        function getRoomId(email1, email2) {
            return [email1, email2].sort().join("_");
        }

        // ✅ Join Room with validation
        async function joinRoom() {

            const email = document.getElementById("emailInput").value.trim();
            const currentUser = parseJwt(localStorage.getItem("token"));

            if (!email) {
                alert("Enter email");
                return;
            }

            if (!currentUser) {
                alert("Login again");
                window.location.href = "/login.html";
                return;
            }

            try {
                // 🔐 Validate email exists
                const res = await axios.get(`${API_URL}/auth/user?email=${email}`);
                receiver = res.data;

                if (!receiver) {
                    alert("User not found");
                    return;
                }

                // ✅ Create room
                currentRoom = getRoomId(currentUser.email, receiver.email);

                socket.emit("join_room", { room: currentRoom });

                chatBody.innerHTML = "";

                console.log("✅ Joined room:", currentRoom);

            } catch (err) {
                alert("User not found or server error");
                console.log(err);
            }
        }

        // ✅ Send Message
        function sendMessage() {

            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (!text) return;

            if (!currentRoom) {
                alert("Join chat first");
                return;
            }

            socket.emit("new_message", {
                room: currentRoom,
                message: text
            });

            input.value = "";
        }

        // ✅ Receive Message
        socket.on("new_message", (data) => {
            appendMessage(data.message, data.userId);
        });

        // ✅ Append Message
        function appendMessage(data) {

            const currentUserId = parseJwt(localStorage.getItem("token"))?.id;

            const msg = document.createElement("div");
            msg.className = "message " + (data.userId === currentUserId ? "sent" : "received");

            if (data.type === "media") {

                if (data.fileUrl.match(/\.(jpeg|jpg|png|gif)$/)) {
                    msg.innerHTML = `<img src="${data.fileUrl}" width="200" />`;
                } else if (data.fileUrl.match(/\.(mp4|webm)$/)) {
                    msg.innerHTML = `<video src="${data.fileUrl}" controls width="200"></video>`;
                } else {
                    msg.innerHTML = `<a href="${data.fileUrl}" target="_blank">Download File</a>`;
                }

            } else {
                msg.innerHTML = data.message;
            }

            chatBody.appendChild(msg);
        }

        async function sendMedia() {

            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            try {

                // 1. Upload to backend
                const res = await axios.post("http://localhost:4000/api/upload", formData);

                const fileUrl = res.data.url;

                // 2. Emit via socket
                socket.emit("send_media", {
                    room: currentRoom,
                    fileUrl
                });

                fileInput.value = "";

            } catch (err) {
                console.log(err);
                alert("Upload failed");
            }
        }

        // Enter key
        document.getElementById("messageInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMessage();
        });

        // Debug logs
        socket.on("connect", () => {
            console.log("✅ Connected:", socket.id);
        });

        socket.on("connect_error", (err) => {
            console.log("❌ Auth error:", err.message);
        });

    </script>

</body>

</html>
