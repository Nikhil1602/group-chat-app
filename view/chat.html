<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: #ffbc41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 650px;
            height: 80%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .chat-header {
            background: #00a130;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #e7efe2;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .sent {
            background: #a7ffc1;
            margin-left: auto;
        }

        .received {
            background: #fff;
            margin-right: auto;
        }

        .timestamp {
            font-size: 10px;
            color: gray;
            text-align: right;
        }

        .chat-footer {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .attach-btn {
            border-color: #d7d7d7;
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <!-- Join -->
        <div class="p-2 border-bottom">
            <input type="text" id="emailInput" class="form-control mb-2" placeholder="Enter user email">
            <button class="btn btn-primary w-100" onclick="joinRoom()">Start Chat</button>
        </div>

        <!-- Header -->
        <div class="chat-header">
            <span>💬 Personal Chat</span>
            <div>
                <button class="btn btn-sm btn-warning" onclick="leaveRoom()">Leave</button>
                <button class="btn btn-sm btn-danger" onclick="resetChat()">Reset</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-body" id="chatBody"></div>
        <div id="suggestions" class="px-2 py-1 pb-2"></div>
        <div id="smartReplies" class="px-2 pb-2"></div>

        <!-- Input -->
        <div class="chat-footer">
            <input type="file" id="fileInput" hidden />
            <button class="btn attach-btn btn-secondary"
                onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" class="form-control" placeholder="Type your message here...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        const API_URL = "http://localhost:4000/api";

        axios.defaults.withCredentials = true;

        const socket = io("http://localhost:4000", {
            auth: {
                token: localStorage.getItem("token")
            }
        });

        const chatBody = document.getElementById("chatBody");
        const emailInput = document.getElementById("emailInput");
        const messageInput = document.getElementById("messageInput");

        let currentRoom = localStorage.getItem("room") || null;
        let currentUser = null;
        let receiver = null;
        let typingTimeout;

        // ------------------
        // UI HELPERS
        // ------------------
        function clearAIUI() {
            document.getElementById("suggestions").innerHTML = "";
            document.getElementById("smartReplies").innerHTML = "";
        }

        function showToast(text, type = "success") {
            const toast = document.createElement("div");
            toast.innerText = text;

            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.right = "20px";
            toast.style.padding = "10px 15px";
            toast.style.background = type === "error" ? "#ff4d4f" : "#00a130";
            toast.style.color = "#fff";
            toast.style.borderRadius = "5px";

            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2000);
        }

        // ------------------
        // SOCKET
        // ------------------
        socket.on("connect", () => {
            console.log("✅ Connected:", socket.id);
        });

        socket.on("room_joined", () => {
            showToast("✅ Joined chat");
        });

        socket.on("new_message", async (data) => {

            appendMessage(data);

            // clear suggestions after message
            clearAIUI();

            // smart replies only for incoming
            if (data.userId !== currentUser.id) {
                try {
                    const res = await axios.post(`${API_URL}/ai/reply`, {
                        message: data.message
                    });

                    showReplies(res.data);
                } catch (err) {
                    console.log(err);
                }
            }
        });

        // ------------------
        // AI UI
        // ------------------
        function showReplies(list) {
            const box = document.getElementById("smartReplies");
            box.innerHTML = "";

            list.forEach(item => {
                const btn = document.createElement("button");
                btn.className = "btn btn-sm btn-success me-2 mb-1";
                btn.innerText = item;

                btn.onclick = () => {
                    messageInput.value = item;
                };

                box.appendChild(btn);
            });
        }

        function showSuggestions(list) {
            const box = document.getElementById("suggestions");
            box.innerHTML = "";

            list.forEach(item => {
                const btn = document.createElement("button");
                btn.className = "btn btn-sm btn-light me-2 mb-1";
                btn.innerText = item;

                btn.onclick = () => {
                    messageInput.value += " " + item;
                };

                box.appendChild(btn);
            });
        }

        // ------------------
        // PREDICTIVE TYPING
        // ------------------
        messageInput.addEventListener("input", (e) => {

            if (!currentRoom) return; // 🚫 don't call AI if not in chat

            clearTimeout(typingTimeout);

            const text = e.target.value;

            if (!text) {
                clearAIUI();
                return;
            }

            typingTimeout = setTimeout(async () => {
                try {
                    const res = await axios.post(`${API_URL}/ai/predict`, { text });
                    showSuggestions(res.data);
                } catch (err) {
                    console.log(err);
                }
            }, 400);
        });

        // ------------------
        // USER
        // ------------------
        async function loadCurrentUser() {
            try {
                const res = await axios.get(`${API_URL}/auth/me`);
                currentUser = res.data;
            } catch {
                window.location.href = "/login.html";
            }
        }

        // ------------------
        // ROOM
        // ------------------
        function getRoomId(id1, id2) {
            return [id1, id2].sort().join("_");
        }

        async function joinRoom() {

            const email = emailInput.value.trim();
            if (!email) return alert("Enter email");

            try {
                const res = await axios.get(`${API_URL}/auth/user?email=${email}`);
                receiver = res.data;

                currentRoom = getRoomId(currentUser.id, receiver.id);
                localStorage.setItem("room", currentRoom);

                socket.emit("join_room", { room: currentRoom });

                chatBody.innerHTML = "";
                clearAIUI();

                document.querySelector(".chat-header span").textContent =
                    `💬 Chat with ${receiver.name || receiver.email}`;

                await loadMessages();

                showToast("🚀 Chat started");

            } catch (err) {
                console.log(err);
                showToast("❌ User not found", "error");
            }
        }

        // ------------------
        // LOAD MESSAGES
        // ------------------
        async function loadMessages() {
            try {
                const res = await axios.get(`${API_URL}/message/${currentRoom}`);

                if (res.data.length === 0) {
                    showSuggestions(["Okay", "Sounds good", "Got it"]);
                }

                chatBody.innerHTML = "";
                res.data.forEach(msg => appendMessage(msg));

            } catch (err) {
                handleAuthError(err);
            }
        }

        // ------------------
        // SEND MESSAGE
        // ------------------
        function sendMessage() {

            const text = messageInput.value.trim();
            if (!text || !currentRoom) return;

            socket.emit("new_message", {
                room: currentRoom,
                message: text
            });

            messageInput.value = "";
            clearAIUI();
        }

        // ------------------
        // APPEND MESSAGE
        // ------------------
        function appendMessage(data) {

            const msg = document.createElement("div");

            msg.className = "message " + (data.userId === currentUser.id ? "sent" : "received");

            msg.innerHTML = `
                ${data.type === "media"
                    ? `<a href="${data.fileUrl}" target="_blank">📎 File</a>`
                    : data.message
                }
                <div class="timestamp">${formatTime(data.createdAt)}</div>
            `;

            chatBody.appendChild(msg);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // ------------------
        // LEAVE
        // ------------------
        function leaveRoom() {

            currentRoom = null;
            receiver = null;

            localStorage.removeItem("room");

            chatBody.innerHTML = "";
            emailInput.value = "";
            messageInput.value = "";

            clearAIUI();

            document.querySelector(".chat-header span").textContent = "💬 Personal Chat";

            showToast("👋 Left chat");
        }

        // ------------------
        // RESET (FIXED UX)
        // ------------------
        async function resetChat() {

            if (!currentRoom) return;

            if (!confirm("Delete this chat?")) return;

            try {

                await axios.delete(`${API_URL}/message/${currentRoom}`);

                chatBody.innerHTML = "";
                clearAIUI();

                showToast("🗑 Chat deleted");

            } catch (err) {
                showToast("❌ Failed", "error");
            }
        }

        // ------------------
        // TIME
        // ------------------
        function formatTime(date) {
            if (!date) return "";
            return new Date(date).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        // ------------------
        // AUTH
        // ------------------
        function handleAuthError(err) {
            if (err.response?.status === 401) {
                window.location.href = "/login.html";
            }
        }

        // ------------------
        // AUTO LOAD
        // ------------------
        window.onload = async () => {

            await loadCurrentUser();

            if (currentRoom) {
                socket.emit("join_room", { room: currentRoom });
                await loadMessages();
                showToast("🔄 Reconnected");
            }
        };

        // ENTER KEY
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

    </script>

</body>

</html>
