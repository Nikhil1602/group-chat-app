<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: #ffbc41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 650px;
            height: 80%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .chat-header {
            background: #00a130;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #e7efe2;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .sent {
            background: #a7ffc1;
            margin-left: auto;
        }

        .received {
            background: #fff;
            margin-right: auto;
        }

        .timestamp {
            font-size: 10px;
            color: gray;
            text-align: right;
        }

        .chat-footer {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .attach-btn {
            border-color: #d7d7d7;
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <!-- Join -->
        <div class="p-2 border-bottom">
            <input type="text" id="emailInput" class="form-control mb-2" placeholder="Enter user email">
            <button class="btn btn-primary w-100" onclick="joinRoom()">Start Chat</button>
        </div>

        <!-- Header -->
        <div class="chat-header">
            <span>💬 Personal Chat</span>
            <div>
                <button class="btn btn-sm btn-warning" onclick="leaveRoom()">Leave</button>
                <button class="btn btn-sm btn-danger" onclick="resetChat()">Reset</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-body" id="chatBody"></div>

        <!-- Input -->
        <div class="chat-footer">
            <input type="file" id="fileInput" hidden />
            <button class="btn attach-btn btn-secondary"
                onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" class="form-control" placeholder="Type your message here...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        const API_URL = "http://localhost:4000/api";

        axios.defaults.withCredentials = true;

        const socket = io("http://localhost:4000", {
            auth: {
                token: localStorage.getItem("token")
            }
        });

        const chatBody = document.getElementById("chatBody");
        const emailInput = document.getElementById("emailInput");
        const messageInput = document.getElementById("messageInput");

        let currentRoom = localStorage.getItem("room") || null;
        let currentUser = null;
        let receiver = null;

        // ------------------
        // SOCKET DEBUG
        // ------------------
        socket.on("connect", () => {
            console.log("✅ Connected:", socket.id);
        });

        socket.on("connect_error", (err) => {
            console.log("❌ Socket error:", err.message);
            alert("Socket connection failed");
        });

        socket.on("room_joined", () => {
            showStatus("✅ Joined chat successfully");
        });

        socket.on("new_message", (data) => {
            appendMessage(data);
        });

        // ------------------
        // LOAD CURRENT USER
        // ------------------
        async function loadCurrentUser() {
            try {
                const res = await axios.get(`${API_URL}/auth/me`);
                currentUser = res.data;
            } catch {
                window.location.href = "/login.html";
            }
        }

        // ------------------
        // ROOM ID
        // ------------------
        function getRoomId(id1, id2) {
            return [id1, id2].sort().join("_");
        }

        // ------------------
        // JOIN ROOM
        // ------------------
        async function joinRoom() {
            const email = emailInput.value.trim();

            if (!email) return alert("Please enter an email");

            try {
                const res = await axios.get(`${API_URL}/auth/user?email=${email}`);
                receiver = res.data;

                currentRoom = getRoomId(currentUser.id, receiver.id);
                localStorage.setItem("room", currentRoom);

                socket.emit("join_room", { room: currentRoom });

                chatBody.innerHTML = "";

                document.querySelector(".chat-header span").textContent =
                    `💬 Chat with ${receiver.name || receiver.email}`;

                showStatus("⏳ Joining chat...");

                await loadMessages();

            } catch (err) {
                console.log(err);
                alert("❌ User not found or error occurred");
            }
        }

        // ------------------
        // LOAD MESSAGES
        // ------------------
        async function loadMessages() {
            try {
                const res = await axios.get(`${API_URL}/message/${currentRoom}`);

                chatBody.innerHTML = "";

                res.data.forEach(msg => appendMessage(msg));

            } catch (err) {
                handleAuthError(err);
            }
        }

        // ------------------
        // SEND MESSAGE
        // ------------------
        function sendMessage() {
            const text = messageInput.value.trim();

            if (!text) return;

            if (!currentRoom) {
                alert("Join chat first");
                return;
            }

            socket.emit("new_message", {
                room: currentRoom,
                message: text
            });

            messageInput.value = "";
        }

        // ------------------
        // APPEND MESSAGE
        // ------------------
        function appendMessage(data) {
            const msg = document.createElement("div");

            msg.className = "message " +
                (data.userId === currentUser.id ? "sent" : "received");

            let content = data.type === "media"
                ? `<a href="${data.fileUrl}" target="_blank">📎 File</a>`
                : data.message;

            msg.innerHTML = `
            ${content}
            <div class="timestamp">${formatTime(data.createdAt)}</div>
        `;

            chatBody.appendChild(msg);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // ------------------
        // LEAVE ROOM (UPDATED)
        // ------------------
        function leaveRoom() {
            currentRoom = null;
            receiver = null;

            localStorage.removeItem("room");

            chatBody.innerHTML = "";
            emailInput.value = "";
            messageInput.value = "";

            document.querySelector(".chat-header span").textContent = "💬 Personal Chat";

            showStatus("👋 Left chat");
        }

        // ------------------
        // RESET CHAT
        // ------------------
        async function resetChat() {

            if (!currentRoom) return;

            const confirmClear = confirm("Are you sure you want to delete this chat?");
            if (!confirmClear) return;

            try {

                await axios.delete(`${API_URL}/message/${currentRoom}`);

                chatBody.innerHTML = "";

                showStatus("🗑️ Chat cleared permanently");

            } catch (err) {

                console.log(err);
                alert("Failed to clear chat");

            }

        }

        // ------------------
        // STATUS MESSAGE UI
        // ------------------
        function showStatus(text) {

            const status = document.createElement("div");
            status.style.textAlign = "center";
            status.style.color = "gray";
            status.style.fontSize = "12px";
            status.style.margin = "5px";

            status.innerText = text;

            chatBody.appendChild(status);

            setTimeout(() => status.remove(), 2000);

        }

        // ------------------
        // TIME FORMAT
        // ------------------
        function formatTime(date) {

            if (!date) return "";
            const d = new Date(date);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        }

        // ------------------
        // AUTH ERROR
        // ------------------
        function handleAuthError(err) {

            if (err.response?.status === 401) {
                window.location.href = "/login.html";
            } else {
                console.log(err);
            }

        }

        // ------------------
        // AUTO LOAD
        // ------------------
        window.onload = async () => {
            await loadCurrentUser();

            if (currentRoom) {
                socket.emit("join_room", { room: currentRoom });
                await loadMessages();
                showStatus("🔄 Reconnected to chat");
            }
        };

        // Enter key
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

    </script>

</body>

</html>
