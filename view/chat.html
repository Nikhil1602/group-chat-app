<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .app-shell {
            max-width: 1200px;
            margin: 24px auto;
        }

        .card-soft {
            border: 0;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(19, 33, 68, 0.08);
        }

        .chat-body {
            height: 420px;
            overflow-y: auto;
            /* background: #e9f3ff; */
            background-color: #e7f1ff;
        }

        .message {
            max-width: 75%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 10px;
        }

        .sent {
            margin-left: auto;
            /* background: #d1fae5; */
            background-color: #c6e9ff;
        }

        .received {
            margin-right: auto;
            background: #fff;
        }

        .timestamp {
            font-size: 11px;
            color: #6b7280;
            text-align: right;
        }

        .media-preview {
            max-width: 220px;
            max-height: 220px;
            border-radius: 8px;
            display: block;
            margin-bottom: 8px;
        }

        .file-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .invite-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            width: 340px;
        }
    </style>
</head>


<body class="bg-primary">

    <div class="app-shell container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="m-0 text-white">🗪 Group Chat</h4>
            <div class="d-flex flex-column">
                <button class="mb-2 btn btn-danger" onclick="logout()">Logout</button>
                <div class="text-white" id="userLabel"></div>
            </div>
        </div>

        <div id="inviteBox"></div>

        <!-- LOBBY -->
        <div id="lobbyView" class="row g-3">
            <div class="col-lg-8">
                <div class="card card-soft">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="m-0">👥 Available Groups</h5>
                            <button class="btn btn-secondary btn-sm" onclick="loadGroups()">Refresh</button>
                        </div>
                        <div id="groupsList" class="list-group"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-soft">
                    <div class="card-body">
                        <h5>➕ Create Group</h5>
                        <input id="createGroupInput" class="form-control my-3" placeholder="Enter group name">
                        <button class="btn btn-primary w-100" onclick="createGroup()">Create Group</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chatView" class="row g-3 d-none">
            <div class="col-lg-8">
                <div class="card card-soft">
                    <div class="card-header d-flex justify-content-between p-3" style="border: none;">
                        <strong id="chatTitle">Room</strong>
                        <button class="btn btn-sm btn-danger" onclick="resetChat()">Clear Messages</button>
                    </div>
                    <div id="chatBody" class="chat-body p-3"></div>
                    <div id="suggestions" class="px-3 pt-2"></div>
                    <div id="smartReplies" class="px-3 pb-2"></div>
                    <div class="p-3 border-top d-flex gap-2">
                        <input type="file" id="fileInput" hidden>
                        <button class="btn btn-light" onclick="document.getElementById('fileInput').click()">📎</button>
                        <input id="messageInput" class="form-control" placeholder="Type your message...">
                        <button class="btn btn-success" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div style="background-color: #ffc637;" class="card card-soft">
                    <div class="card-body">
                        <h6 class="mb-3">📫 Invite People</h6>
                        <div id="ungroupedList" class="list-group"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        const API_URL = "http://localhost:4000/api";

        axios.defaults.withCredentials = true;

        axios.interceptors.response.use(res => res, err => {
            if (err.response?.status === 401) {
                if (!window.location.pathname.includes("login.html")) {
                    window.location.href = "./login.html";
                }
            }
            return Promise.reject(err);
        });

        const socket = io("http://localhost:4000", {
            auth: { token: localStorage.getItem("token") }
        });

        const lobbyView = document.getElementById("lobbyView");
        const chatView = document.getElementById("chatView");
        const groupsList = document.getElementById("groupsList");
        const ungroupedList = document.getElementById("ungroupedList");
        const chatBody = document.getElementById("chatBody");
        const messageInput = document.getElementById("messageInput");
        const fileInput = document.getElementById("fileInput");
        const userLabel = document.getElementById("userLabel");
        const chatTitle = document.getElementById("chatTitle");
        const inviteBox = document.getElementById("inviteBox");
        let typingTimeout;
        let currentUser = null;
        let currentGroup = null;

        function showToast(text, type = "success") {
            const toast = document.createElement("div");
            toast.className = "invite-alert alert " + (type === "error" ? "alert-danger" : "alert-success");
            toast.innerText = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        }

        function clearAIUI() {
            document.getElementById("suggestions").innerHTML = "";
            document.getElementById("smartReplies").innerHTML = "";
        }

        function isMediaMessage(data) {
            if (data.type === "media" && data.fileUrl) return true;
            if (typeof data.message !== "string") return false;
            if (!data.message.startsWith("{")) return data.message.includes("/uploads/");
            try { return !!JSON.parse(data.message).fileUrl; } catch { return false; }
        }

        function getMediaData(data) {
            if (data.type === "media") return { fileUrl: data.fileUrl, fileName: data.fileName || "file", mimeType: data.mimeType || "" };
            try {
                const parsed = JSON.parse(data.message);
                return { fileUrl: parsed.fileUrl, fileName: parsed.fileName || "file", mimeType: parsed.mimeType || "" };
            } catch {
                return { fileUrl: data.message, fileName: "file", mimeType: "" };
            }
        }

        function isImageType(mimeType, fileUrl = "") {
            if (mimeType && mimeType.startsWith("image/")) return true;
            return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(fileUrl);
        }

        function renderAppMode() {
            const inGroup = !!currentUser?.groupId;
            lobbyView.classList.toggle("d-none", inGroup);
            chatView.classList.toggle("d-none", !inGroup);
            if (inGroup) {
                console.log(currentUser);
                currentGroup = currentUser.Group;
                chatTitle.textContent = `👥 Group - #${currentGroup.name}`;
            }
        }

        async function loadCurrentUser() {
            try {
                const res = await axios.get(`${API_URL}/auth/me`);
                console.log(res);
                currentUser = res.data;
                userLabel.textContent = `${currentUser.name} (${currentUser.email})`;
                renderAppMode();
            } catch {
                window.location.href = "/login.html";
            }
        }

        async function loadGroups() {
            const res = await axios.get(`${API_URL}/group`);
            groupsList.innerHTML = "";
            if (!res.data.length) {
                groupsList.innerHTML = `<div class="text-muted text-center py-3 bg-light">No groups yet.</div>`;
                return;
            }
            res.data.forEach(group => {
                const item = document.createElement("div");
                item.className = "list-group-item d-flex justify-content-between align-items-center";
                item.innerHTML = `
                    <div><strong>${group.name}</strong></div>
                    <button class="btn btn-sm btn-primary">Join</button>
                `;
                item.querySelector("button").onclick = () => joinGroup(group.id);
                groupsList.appendChild(item);
            });
        }

        async function createGroup() {
            const input = document.getElementById("createGroupInput");
            const name = input.value.trim();
            if (!name) return showToast("Enter group name", "error");
            try {
                const res = await axios.post(`${API_URL}/group`, { name });
                input.value = "";
                currentUser.groupId = res.data.id;
                socket.emit("group_joined", { groupId: res.data.id });
                socket.emit("join_room", { room: String(res.data.id) });
                renderAppMode();
                await loadMessages();
                await loadUngroupedUsers();
                showToast("Group created");
            } catch (err) {
                showToast(err.response?.data?.message || "Create group failed", "error");
            }
        }

        async function joinGroup(groupId) {
            try {
                await axios.post(`${API_URL}/group/join/${groupId}`);
                currentUser.groupId = groupId;
                socket.emit("group_joined", { groupId });
                socket.emit("join_room", { room: String(groupId) });
                renderAppMode();
                await loadMessages();
                await loadUngroupedUsers();
                showToast("Joined group");
            } catch (err) {
                showToast(err.response?.data?.message || "Join failed", "error");
            }
        }

        async function loadUngroupedUsers() {
            const res = await axios.get(`${API_URL}/auth/ungrouped`);
            ungroupedList.innerHTML = "";
            const users = res.data.filter(u => u.id !== currentUser.id);
            if (!users.length) {
                ungroupedList.innerHTML = `<div class="text-muted text-center py-2">😭 Everyone already joined a group.</div>`;
                return;
            }
            users.forEach(user => {
                const row = document.createElement("div");
                row.className = "list-group-item d-flex justify-content-between align-items-center";
                row.style.backgroundColor = "#fadb8d";
                row.style.border = "none";
                row.innerHTML = `
                    <div>
                        <div>👤 ${user.name || "User"}</div>
                        <small class="text-muted">${user.email}</small>
                    </div>
                    <button class="btn btn-sm btn-primary">Invite</button>
                `;
                row.querySelector("button").onclick = () => inviteUser(user.id);
                ungroupedList.appendChild(row);
            });
        }

        function inviteUser(targetUserId) {
            if (!currentUser?.groupId) return;
            socket.emit("invite_to_group", { targetUserId });
            showToast("Invitation sent");
        }

        function showInvitation(invite) {

            inviteBox.innerHTML = `
                <div class="invite-alert alert alert-info">
                    <div><strong>${invite.invitedBy}</strong> invited you to <strong>${invite.groupName}</strong></div>
                    <div class="mt-2">
                        <button id="acceptInviteBtn" class="btn btn-sm btn-primary">Accept Invitation</button>
                    </div>
                </div>
            `;

            document.getElementById("acceptInviteBtn").onclick = async () => {
                try {
                    await axios.post(`${API_URL}/group/accept-invite`, { groupId: invite.groupId });
                    currentUser.groupId = invite.groupId;
                    inviteBox.innerHTML = "";
                    socket.emit("group_joined", { groupId: invite.groupId });
                    socket.emit("join_room", { room: String(invite.groupId) });
                    renderAppMode();
                    await loadMessages();
                    await loadUngroupedUsers();
                } catch (err) {
                    showToast(err.response?.data?.message || "Failed to accept invite", "error");
                }
            };

        }

        async function loadMessages() {
            if (!currentUser?.groupId) return;
            const res = await axios.get(`${API_URL}/message/${currentUser.groupId}`);
            chatBody.innerHTML = "";
            res.data.forEach(msg => appendMessage(msg));
        }

        function appendMessage(data) {

            const msg = document.createElement("div");
            msg.className = "message " + (data.userId === currentUser.id ? "sent" : "received");
            const mediaMessage = isMediaMessage(data);
            const mediaData = mediaMessage ? getMediaData(data) : null;
            const sender = data.userId === currentUser.id ? "You" : (data.userName || `User ${data.userId}`);

            msg.innerHTML = `
                <div class="mb-1"><small><strong>${sender}</strong></small></div>
                ${mediaMessage
                    ? (
                        isImageType(mediaData.mimeType, mediaData.fileUrl)
                            ? `<a href="${mediaData.fileUrl}" target="_blank"><img src="${mediaData.fileUrl}" class="media-preview" alt="${mediaData.fileName}"></a>
                               <div class="file-meta"><span>${mediaData.fileName}</span><a class="btn btn-sm btn-outline-primary" href="${mediaData.fileUrl}" download="${mediaData.fileName}">Download</a></div>`
                            : `<div class="file-meta"><a href="${mediaData.fileUrl}" target="_blank">📎 ${mediaData.fileName}</a><a class="btn btn-sm btn-outline-primary" href="${mediaData.fileUrl}" download="${mediaData.fileName}">Download</a></div>`
                    )
                    : data.message}
                <div class="timestamp">${new Date(data.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
            `;

            chatBody.appendChild(msg);
            chatBody.scrollTop = chatBody.scrollHeight;

        }

        function sendMessage() {

            const text = messageInput.value.trim();
            if (!text || !currentUser?.groupId) return;
            socket.emit("new_message", { room: String(currentUser.groupId), message: text });
            messageInput.value = "";
            clearAIUI();

        }

        async function uploadAndSendMedia(file) {

            if (!file || !currentUser?.groupId) return;
            const formData = new FormData();
            formData.append("file", file);

            const res = await axios.post(`${API_URL}/upload`, formData, { headers: { "Content-Type": "multipart/form-data" } });
            socket.emit("send_media", {
                room: String(currentUser.groupId),
                fileUrl: res.data.url,
                fileName: res.data.fileName,
                mimeType: res.data.mimeType
            });

        }

        async function resetChat() {

            if (!currentUser?.groupId) return;
            if (!confirm("Delete all messages in this group?")) return;
            await axios.delete(`${API_URL}/message/${currentUser.groupId}`);
            await loadMessages();

        }

        socket.on("new_message", async (data) => {

            appendMessage(data);
            clearAIUI();

            const mediaMessage = isMediaMessage(data);

            if (!mediaMessage && data.userId !== currentUser.id) {

                try {

                    const res = await axios.post(`${API_URL}/ai/reply`, { message: data.message });
                    const box = document.getElementById("smartReplies");
                    box.innerHTML = "";
                    res.data.forEach(item => {
                        const btn = document.createElement("button");
                        btn.className = "btn btn-sm btn-success me-2 mb-1";
                        btn.innerText = item;
                        btn.onclick = () => { messageInput.value = item; };
                        box.appendChild(btn);
                    });

                } catch (_err) { }

            }
        });

        socket.on("group_invitation", (invite) => {
            if (currentUser?.groupId) return;
            showInvitation(invite);
        });

        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        messageInput.addEventListener("input", (e) => {
            if (!currentUser?.groupId) return;
            clearTimeout(typingTimeout);
            const text = e.target.value;
            if (!text) return clearAIUI();
            typingTimeout = setTimeout(async () => {
                try {
                    const res = await axios.post(`${API_URL}/ai/predict`, { text });
                    const box = document.getElementById("suggestions");
                    box.innerHTML = "";
                    res.data.forEach(item => {
                        const btn = document.createElement("button");
                        btn.className = "btn btn-sm btn-secondary me-2 mb-1";
                        btn.innerText = item;
                        btn.onclick = () => { messageInput.value += " " + item; };
                        box.appendChild(btn);
                    });
                } catch (_err) { }
            }, 400);
        });

        fileInput.addEventListener("change", async (e) => {

            const file = e.target.files?.[0];

            if (!file) return;

            try {

                await uploadAndSendMedia(file);
                showToast("File shared");

            } catch (_err) {

                showToast("Upload failed", "error");

            } finally {

                fileInput.value = "";

            }

        });

        window.onload = async () => {

            await loadCurrentUser();

            if (currentUser.groupId) {

                socket.emit("group_joined", { groupId: currentUser.groupId });
                socket.emit("join_room", { room: String(currentUser.groupId) });
                await loadMessages();
                await loadUngroupedUsers();

            } else {

                await loadGroups();

            }

        };

        async function logout() {

            await axios.post(`${API_URL}/auth/logout`);
            localStorage.removeItem("token");
            window.location.href = "/login.html";

        }

    </script>
</body>

</html>
